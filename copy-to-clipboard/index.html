<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Copy to Clipboard</title>
  <!-- load tailwind css -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

  <div class="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full mx-4">
    <h2 class="text-2xl font-bold mb-5 text-gray-800">Copy to Clipboard</h2>
    
    <div class="relative">
      <input 
        type="text" 
        id="text-to-copy" 
        value="https://awesome-website.com/snippet" 
        readonly
        class="w-full bg-slate-50 border border-slate-300 text-slate-700 text-sm rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 block p-3 pr-24 outline-none transition-all duration-200"
      />
      <button 
        id="copy-btn"
        class="absolute right-1.5 top-1.5 bottom-1.5 bg-blue-600 hover:bg-blue-700 text-white font-medium text-sm px-4 rounded-md transition-colors duration-200 flex items-center justify-center min-w-[70px]"
      >
        Copy
      </button>
    </div>
    
    <!-- Feedback message -->
    <p id="feedback-msg" class="mt-3 text-sm text-green-600 font-medium opacity-0 transition-opacity duration-300 flex items-center gap-1">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
      </svg>
      Copied to clipboard!
    </p>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const copyBtn = document.getElementById("copy-btn");
      const textInput = document.getElementById("text-to-copy");
      const feedbackMsg = document.getElementById("feedback-msg");

      copyBtn.addEventListener("click", async () => {
        try {
          // Modern way (requires HTTPS or localhost)
          if (navigator.clipboard && window.isSecureContext) {
            await navigator.clipboard.writeText(textInput.value);
          } else {
            // Fallback for local file:// testing or older browsers
            textInput.select();
            document.execCommand("copy");
            // Deselect the text so it doesn't stay highlighted
            window.getSelection().removeAllRanges();
          }

          // 1. Change button text to "Copied!"
          copyBtn.textContent = "Copied!";
          // 2. Change button background color to green
          copyBtn.classList.replace("bg-blue-600", "bg-green-600");
          copyBtn.classList.replace("hover:bg-blue-700", "hover:bg-green-700");
          // 3. Show the success message below the input
          feedbackMsg.classList.remove("opacity-0");

          // Reset everything back to normal after 2 seconds
          setTimeout(() => {
            copyBtn.textContent = "Copy";
            copyBtn.classList.replace("bg-green-600", "bg-blue-600");
            copyBtn.classList.replace("hover:bg-green-700", "hover:bg-blue-700");
            feedbackMsg.classList.add("opacity-0");
          }, 2000);

        } catch (err) {
          console.error("Failed to copy text:", err);
          alert("Failed to copy to clipboard.");
        }
      });
    });
  </script>
</body>
</html>
